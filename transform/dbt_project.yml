name: concrete_data
version: "1.0.0"
config-version: 2

profile: concrete_data

model-paths:  ["models"]
test-paths:   ["tests"]
macro-paths:  ["macros"]
target-path:  "target"
clean-targets: ["target", "dbt_packages"]

vars:
  elementary:
    days_back: 14

models:
  concrete_data:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts
