version: 2

models:
  - name: stg_nyc311
    description: "Casts types and renames columns for the 311 dataset."
    columns:
      - name: unique_key
        data_tests:
          - unique
          - not_null
      - name: created_at
        description: "The timestamp the request was opened."
        data_tests:
          - not_null
      - name: agency
        description: "Agency acronym (e.g., NYPD, DOT, DSNY)."
      - name: borough
        data_tests:
          - accepted_values:
              values: ['BRONX', 'BROOKLYN', 'MANHATTAN', 'QUEENS', 'STATEN ISLAND', 'Unspecified']