name: CI — dev checks

on:
  pull_request:
    branches: [main]
    paths:
      - "pipeline/**"
      - "transform/**"
      - "dashboard/**"
      - "Dockerfile"
      - "entrypoint.sh"

env:
  ENV:         dev
  DUCKDB_PATH: /tmp/concrete_data_dev.duckdb

jobs:
  # ── Lint Python ───────────────────────────────────────────────────────────
  lint:
    name: Python lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check pipeline/ --config pyproject.toml
      - run: ruff format --check pipeline/ --config pyproject.toml

  # ── dlt smoke test (DuckDB, no GCP) ──────────────────────────────────────
  test-pipeline:
    name: dlt smoke test (DuckDB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - run: pip install -r pipeline/requirements.txt

      - name: Write minimal secrets
        run: |
          mkdir -p pipeline/.dlt
          cp .dlt/config.toml pipeline/.dlt/config.toml
          printf '[sources.nyc_311]\napp_token = ""\n' > pipeline/.dlt/secrets.toml

      - name: Run pipeline (DuckDB)
        working-directory: pipeline
        run: python pipeline.py

  # ── dbt compile + test (DuckDB) ──────────────────────────────────────────
  test-dbt:
    name: dbt compile & test (DuckDB)
    runs-on: ubuntu-latest
    needs: test-pipeline
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: transform/requirements.txt

      - run: pip install -r transform/requirements.txt
      - run: cd transform && dbt deps
      - name: dbt run + test (DuckDB)
        working-directory: transform
        run: |
          dbt run  --target dev --profiles-dir .
          dbt test --target dev --profiles-dir .

  # ── Docker build check ────────────────────────────────────────────────────
  build-docker:
    name: Docker build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image (no push)
        run: docker build --tag concrete-data-pipeline:ci-check .

  # ── Evidence build check ──────────────────────────────────────────────────
  test-dashboard:
    name: Evidence build check
    runs-on: ubuntu-latest
    needs: test-dbt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: cd dashboard && npm ci
      - name: Build (DuckDB mode)
        working-directory: dashboard
        env:
          EVIDENCE_SOURCE__DEFAULT__CONNECTOR: duckdb
          EVIDENCE_SOURCE__DEFAULT__FILENAME:  /tmp/concrete_data_dev.duckdb
        run: npm run build
