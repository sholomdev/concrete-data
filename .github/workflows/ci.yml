name: CI — dev checks

on:
  pull_request:
    branches: [main]
    paths:
      - "pipeline/**"
      - "transform/**"
      - "dashboard/**"

env:
  ENV:        dev
  DUCKDB_PATH: /tmp/concrete_data_dev.duckdb

jobs:
  # ── Lint + type check Python ─────────────────────────────────────────────
  lint-python:
    name: Python lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check pipeline/ --config pyproject.toml
      - run: ruff format --check pipeline/ --config pyproject.toml

  # ── dlt smoke test (DuckDB, no GCP needed) ───────────────────────────────
  test-pipeline-dev:
    name: dlt smoke test (DuckDB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - run: pip install -r pipeline/requirements.txt

      - name: Write minimal secrets
        run: |
          mkdir -p pipeline/.dlt
          echo '[sources.nyc_311]' > pipeline/.dlt/secrets.toml
          echo 'app_token = ""'   >> pipeline/.dlt/secrets.toml

      - name: Copy config
        run: cp .dlt/config.toml pipeline/.dlt/config.toml

      - name: Run pipeline (DuckDB, 100-row sample)
        working-directory: pipeline
        env:
          ENV:        dev
          DUCKDB_PATH: /tmp/concrete_data_dev.duckdb
        run: python pipeline.py

  # ── dbt compile + test (DuckDB) ──────────────────────────────────────────
  test-dbt-dev:
    name: dbt compile & test (DuckDB)
    runs-on: ubuntu-latest
    needs: test-pipeline-dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: transform/requirements.txt

      - run: pip install -r transform/requirements.txt
      - name: dbt deps
        working-directory: transform
        run: dbt deps

      - name: dbt compile
        working-directory: transform
        env:
          ENV:        dev
          DUCKDB_PATH: /tmp/concrete_data_dev.duckdb
          DBT_PROFILES_DIR: .
        run: dbt compile --target dev --profiles-dir .

      - name: dbt run (dev)
        working-directory: transform
        env:
          ENV:        dev
          DUCKDB_PATH: /tmp/concrete_data_dev.duckdb
          DBT_PROFILES_DIR: .
        run: dbt run --target dev --profiles-dir .

      - name: dbt test (dev)
        working-directory: transform
        env:
          ENV:        dev
          DUCKDB_PATH: /tmp/concrete_data_dev.duckdb
          DBT_PROFILES_DIR: .
        run: dbt test --target dev --profiles-dir .

  # ── Evidence build check ─────────────────────────────────────────────────
  test-dashboard:
    name: Evidence build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install
        working-directory: dashboard
        run: npm ci
      - name: Build (DuckDB mode)
        working-directory: dashboard
        env:
          EVIDENCE_SOURCE__DEFAULT__CONNECTOR: duckdb
          EVIDENCE_SOURCE__DEFAULT__FILENAME: /tmp/concrete_data_dev.duckdb
        run: npm run build
