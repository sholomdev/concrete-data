name: Terraform

on:
  push:
    branches: [main]
    paths:    ["infra/**"]
  pull_request:
    paths:    ["infra/**"]

permissions:
  contents:      read
  id-token:      write
  pull-requests: write

jobs:
  terraform:
    name: Plan / Apply
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8"

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:            ${{ secrets.PIPELINE_SA_EMAIL }}

      - run: terraform init
      - run: terraform validate

      - name: Terraform plan
        id: plan
        run: |
          terraform plan \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="github_repo=sholomdev/concrete-data" \
            -var="region=${{ secrets.GCP_REGION }}" \
            -out=tfplan \
            -no-color 2>&1 | tee plan_output.txt

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/plan_output.txt', 'utf8');
            const body = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... (truncated)'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform plan\n\`\`\`\n${body}\n\`\`\``
            });

      - name: Terraform apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan
