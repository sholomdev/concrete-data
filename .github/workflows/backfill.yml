name: Backfill

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (YYYY-MM-DD)"
        type: string
        default: "2025-01-01"
      end_date:
        description: "End date (YYYY-MM-DD) — leave blank for today"
        type: string
        default: ""
      dry_run:
        description: "Dry run — count rows without loading"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  backfill:
    name: "Backfill ${{ inputs.start_date }} → ${{ inputs.end_date || 'today' }}"
    runs-on: ubuntu-latest
    timeout-minutes: 10   # just triggers the job; Cloud Run does the work

    steps:
      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:            ${{ secrets.PIPELINE_SA_EMAIL }}

      - name: Trigger Cloud Run Job (backfill)
        run: |
          gcloud run jobs execute nyc-311-pipeline \
            --region "${{ secrets.GCP_REGION }}" \
            --wait \
            --update-env-vars "\
          INITIAL_START_DATE=${{ inputs.start_date }}T00:00:00,\
          END_DATE=${{ inputs.end_date && format('{0}T23:59:59', inputs.end_date) || '' }},\
          DRY_RUN=${{ inputs.dry_run }}"
