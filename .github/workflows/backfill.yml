name: Backfill

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Backfill start date (YYYY-MM-DD) — defaults to 2025-01-01"
        type: string
        default: "2025-01-01"
      end_date:
        description: "Backfill end date (YYYY-MM-DD) — defaults to today"
        type: string
        default: ""
      dry_run:
        description: "Dry run — print row counts without loading"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

env:
  ENV:            prod
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  backfill:
    name: "Backfill ${{ inputs.start_date }} → ${{ inputs.end_date || 'today' }}"
    runs-on: ubuntu-latest
    timeout-minutes: 120   # backfills can be slow

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:            ${{ secrets.PIPELINE_SA_EMAIL }}

      - name: Write dlt secrets
        env:
          SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
        run: |
          mkdir -p pipeline/.dlt
          cat > pipeline/.dlt/secrets.toml <<EOF
          [sources.nyc_311]
          app_token = "${SOCRATA_APP_TOKEN}"
          EOF

      - name: Copy dlt config
        run: cp .dlt/config.toml pipeline/.dlt/config.toml

      - name: Run backfill
        working-directory: pipeline
        env:
          INITIAL_START_DATE: "${{ inputs.start_date }}T00:00:00"
          END_DATE:           "${{ inputs.end_date && format('{0}T23:59:59', inputs.end_date) || '' }}"
          DRY_RUN:            "${{ inputs.dry_run }}"
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN: would backfill from $INITIAL_START_DATE"
            python - <<'PYEOF'
          import os
          import dlt
          from sources.nyc_311 import requests_resource

          start = os.environ["INITIAL_START_DATE"]
          print(f"Counting available rows from {start}...")
          count = 0
          for page in requests_resource(initial_start_date=start).add_limit(5000):
              count += 1 if isinstance(page, dict) else len(page)
              if count >= 5000:
                  break
          print(f"Sample: ≥{count} rows available from {start} (capped at 5000)")
          PYEOF
          else
            python pipeline.py --full
          fi

  # Run dbt after a successful non-dry-run backfill
  transform-after-backfill:
    name: dbt transform (post-backfill)
    runs-on: ubuntu-latest
    needs: backfill
    if: ${{ !inputs.dry_run }}
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: transform/requirements.txt

      - name: Install dbt
        run: pip install -r transform/requirements.txt

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:            ${{ secrets.DBT_SA_EMAIL }}

      - name: dbt deps
        working-directory: transform
        run: dbt deps

      - name: dbt run (full refresh on marts)
        working-directory: transform
        env:
          DBT_PROFILES_DIR: .
        run: dbt run --target prod --profiles-dir . --full-refresh

      - name: dbt test
        working-directory: transform
        env:
          DBT_PROFILES_DIR: .
        run: dbt test --target prod --profiles-dir . --store-failures
