name: Deploy pipeline image

on:
  push:
    branches: [main]
    paths:
      - "pipeline/**"
      - "transform/**"
      - "dashboard/**"
      - "entrypoint.sh"
      - "Dockerfile"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_REGION: ${{ secrets.GCP_REGION }}

jobs:
  # ── Build and push Docker image ───────────────────────────────────────────
  build-and-push:
    name: Build + push image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      image_url: ${{ steps.build.outputs.image_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:            ${{ secrets.PIPELINE_SA_EMAIL }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        id: build
        env:
          IMAGE_URL: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/concrete-data/pipeline
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | head -c 7)
          docker build \
            --tag "${IMAGE_URL}:${SHORT_SHA}" \
            --tag "${IMAGE_URL}:latest" \
            --cache-from "${IMAGE_URL}:latest" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            .
          docker push "${IMAGE_URL}:${SHORT_SHA}"
          docker push "${IMAGE_URL}:latest"
          echo "image_url=${IMAGE_URL}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

  # ── Update Cloud Run Job to use new image ─────────────────────────────────
  update-job:
    name: Update Cloud Run Job image
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 5

    steps:
      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:            ${{ secrets.PIPELINE_SA_EMAIL }}

      - name: Update job image
        run: |
          gcloud run jobs update nyc-311-pipeline \
            --image "${{ needs.build-and-push.outputs.image_url }}" \
            --region "${{ secrets.GCP_REGION }}"

  # ── Trigger an immediate run on main branch pushes ────────────────────────
  trigger-run:
    name: Trigger pipeline run
    runs-on: ubuntu-latest
    needs: update-job
    timeout-minutes: 90   # wait for the job to complete
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:            ${{ secrets.PIPELINE_SA_EMAIL }}

      - name: Execute Cloud Run Job (wait for completion)
        run: |
          gcloud run jobs execute nyc-311-pipeline \
            --region "${{ secrets.GCP_REGION }}" \
            --wait
